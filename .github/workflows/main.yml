name: Sistema de Cotacao Automatizada
on:
  workflow_dispatch:
    inputs:
      item:
        description: 'Descrição do Item'
        required: true
      quantidade:
        description: 'Quantidade'
        required: true
        default: '1'

jobs:
  gerar_relatorio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install playwright fpdf2
          playwright install chromium

      - name: Executar Bot
        run: python cotacao_institucional.py "${{ github.event.inputs.item }}" "${{ github.event.inputs.quantidade }}"

      - name: Disponibilizar Relatório PDF
        uses: actions/upload-artifact@v3
        with:
          name: Mapa-de-Cotacao
          path: cotacao.pdf
