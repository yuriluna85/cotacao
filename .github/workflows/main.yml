name: Sistema de Cotacao Automatizada
on:
  workflow_dispatch:
    inputs:
      item:
        description: 'Descrição do Item'
        required: true
      quantidade:
        description: 'Quantidade'
        required: true
        default: '1'

jobs:
  gerar_relatorio:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install playwright fpdf2
          playwright install chromium

      - name: Executar Bot
        run: python cotacao_institucional.py "${{ github.event.inputs.item }}" "${{ github.event.inputs.quantidade }}"

      - name: Salvar PDF no Repositório
        run: |
          git config --global user.name "Robo DICOM"
          git config --global user.email "actions@github.com"
          git add cotacao.pdf
          git commit -m "Cotação BR: ${{ github.event.inputs.item }}" || echo "Sem alterações"
          git push
