name: Sistema de Cotacao Automatizada
on:
  workflow_dispatch:
    inputs:
      item:
        description: 'Item'
        required: true
      quantidade:
        description: 'Qtd'
        required: true
        default: '1'

jobs:
  gerar_relatorio:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Deps
        run: |
          pip install playwright fpdf2
          playwright install chromium
      - name: Run
        run: python cotacao_institucional.py "${{ github.event.inputs.item }}" "${{ github.event.inputs.quantidade }}"
      - name: Commit
        run: |
          git config --global user.name "Bot DICOM"
          git config --global user.email "actions@github.com"
          git add cotacao.pdf
          git commit -m "Update v1.8 - ML Engine" || echo "No changes"
          git push
