<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DICOM v1.7 - Yuri Luna</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-950 min-h-screen flex items-center justify-center p-4 text-white">

    <div class="fixed bottom-4 right-4 bg-indigo-500 text-white text-[10px] px-3 py-1 rounded-full shadow-lg font-bold">
        BUILD: v1.7 (ULTRA-ROBUST)
    </div>

    <div class="bg-indigo-900 p-8 rounded-3xl shadow-2xl w-full max-w-md border-b-8 border-indigo-400">
        <h1 class="text-3xl font-black mb-1 text-center italic text-indigo-300">DICOM <span class="text-white">v1.7</span></h1>
        <p class="text-center text-indigo-400 text-[10px] mb-8 uppercase tracking-widest">Motor de Busca Reforçado</p>
        
        <div class="space-y-4">
            <input type="text" id="item" placeholder="O que deseja cotar?" class="w-full bg-indigo-800 border-2 border-indigo-700 p-3 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
            <input type="number" id="qtd" value="1" class="w-full bg-indigo-800 border-2 border-indigo-700 p-3 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
            <input type="password" id="token" placeholder="Token PAT" class="w-full bg-indigo-800 border-2 border-indigo-700 p-3 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
            
            <button onclick="enviar()" id="btn" class="w-full bg-indigo-500 text-white font-black p-4 rounded-xl hover:bg-indigo-400 transition-all uppercase">
                Gerar Cotação v1.7
            </button>
        </div>
        <div id="status" class="mt-8 text-xs text-center font-bold uppercase min-h-[20px]"></div>
    </div>

    <script>
        async function enviar() {
            const item = document.getElementById('item').value;
            const qtd = document.getElementById('qtd').value;
            const token = document.getElementById('token').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');

            if (!item || !token) { alert("Preencha os campos!"); return; }

            status.innerHTML = "<span class='animate-pulse'>🚀 ATIVANDO MOTOR v1.7...</span>";
            btn.disabled = true;

            try {
                const response = await fetch(`https://api.github.com/repos/yuriluna85/cotacao/actions/workflows/main.yml/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
                    body: JSON.stringify({ ref: 'main', inputs: { item: item, quantidade: qtd } })
                });

                if (response.ok) {
                    status.innerHTML = "<span class='text-green-400'>✅ ENVIADO! VERIFIQUE O REPOSITÓRIO EM 2 MIN.</span>";
                } else {
                    const err = await response.json();
                    status.innerHTML = `<span class='text-red-400'>❌ ERRO: ${err.message}</span>`;
                }
            } catch (e) {
                status.innerHTML = "❌ FALHA DE CONEXÃO";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
