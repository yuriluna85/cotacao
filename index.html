<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cotação DICOM - IF Baiano</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-green-700 mb-6 text-center">Gerador de Cotação</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Descrição do Item</label>
                <input type="text" id="item" placeholder="Ex: Câmera Sony A7" class="w-full border p-2 rounded mt-1">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Quantidade</label>
                <input type="number" id="qtd" value="1" min="1" class="w-full border p-2 rounded mt-1">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 text-red-600 font-bold">Personal Access Token (PAT)</label>
                <input type="password" id="token" placeholder="Cole aqui seu ghp_..." class="w-full border p-2 rounded mt-1 border-red-200 focus:ring-red-500">
                <p class="text-[10px] text-gray-400 mt-1">O token não é salvo por segurança.</p>
            </div>

            <button onclick="enviar()" id="btn" class="w-full bg-green-600 text-white font-bold p-3 rounded hover:bg-green-700 transition">
                DISPARAR ROBÔ
            </button>
        </div>

        <div id="status" class="mt-6 text-sm text-center font-medium"></div>
    </div>

    <script>
        async function enviar() {
            const item = document.getElementById('item').value;
            const qtd = document.getElementById('qtd').value;
            const token = document.getElementById('token').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');

            // --- ATENÇÃO: COLOQUE SEUS DADOS AQUI ---
            const usuario = "SEU_USUARIO_AQUI"; 
            const repositorio = "NOME_DO_REPO_AQUI";

            if (!item || !token) {
                alert("Preencha o item e o Token!");
                return;
            }

            status.innerText = "⏳ Acionando workflow no GitHub...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://api.github.com/repos/${usuario}/${repositorio}/actions/workflows/main.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github+json',
                    },
                    body: JSON.stringify({ ref: 'main', inputs: { item: item, quantidade: qtd } })
                });

                if (response.ok) {
                    status.innerHTML = "<span class='text-green-600'>✅ Sucesso! O robô começou a trabalhar.<br>Acesse a aba Actions para baixar o PDF.</span>";
                } else {
                    const err = await response.json();
                    throw new Error(err.message);
                }
            } catch (e) {
                status.innerHTML = `<span class='text-red-600'>❌ Erro: ${e.message}</span>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
