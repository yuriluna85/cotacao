<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cotação - IF Baiano</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-green-700">Cotação Automatizada</h1>
            <p class="text-gray-500 text-sm">Gere mapas de preços oficiais via GitHub Actions</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Descrição do Item</label>
                <input type="text" id="item" placeholder="Ex: Monitor 24 polegadas" 
                    class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-green-500 focus:border-green-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Quantidade</label>
                <input type="number" id="quantidade" value="1" min="1"
                    class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Personal Access Token (PAT)</label>
                <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" 
                    class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-xs">
                <p class="text-[10px] text-gray-400 mt-1">O token precisa de permissão 'workflow'.</p>
            </div>

            <button onclick="dispararCotacao()" id="btn-enviar"
                class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded hover:bg-green-700 transition duration-200">
                Gerar Cotação no GitHub
            </button>
        </div>

        <div id="status" class="mt-6 hidden p-3 rounded text-sm text-center"></div>
        
        <div class="mt-4 text-center">
            <a href="https://github.com" target="_blank" id="link-repo" class="text-blue-600 hover:underline text-xs hidden">
                Ver progresso no GitHub Actions →
            </a>
        </div>
    </div>

    <script>
        async function dispararCotacao() {
            const item = document.getElementById('item').value;
            const quantidade = document.getElementById('quantidade').value;
            const token = document.getElementById('token').value;
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('btn-enviar');

            // Configurações do seu repositório (AJUSTE AQUI)
            const owner = 'SEU_USUARIO_GITHUB'; 
            const repo = 'NOME_DO_REPOSITORIO';
            const workflow_id = 'main.yml'; 

            if (!item || !token) {
                alert("Por favor, preencha o item e o Token!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Enviando comando...";
            statusDiv.classList.remove('hidden', 'bg-red-100', 'bg-green-100');
            statusDiv.innerText = "Iniciando Workflow...";

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/${workflow_id}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github+json',
                    },
                    body: JSON.stringify({
                        ref: 'main', // ou sua branch principal
                        inputs: {
                            item: item,
                            quantidade: quantidade
                        }
                    })
                });

                if (response.ok) {
                    statusDiv.classList.add('bg-green-100', 'text-green-800');
                    statusDiv.innerText = "✅ Robô iniciado! O PDF estará pronto em instantes na aba Actions.";
                    document.getElementById('link-repo').classList.remove('hidden');
                    document.getElementById('link-repo').href = `https://github.com/${owner}/${repo}/actions`;
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message || "Erro ao disparar.");
                }
            } catch (error) {
                statusDiv.classList.add('bg-red-100', 'text-red-800');
                statusDiv.innerText = "❌ Erro: " + error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Gerar Cotação no GitHub";
            }
        }
    </script>
</body>
</html>
