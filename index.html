<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cotação DICOM - Yuri Luna</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="fixed bottom-4 right-4 bg-slate-800 text-white text-[10px] px-3 py-1 rounded-full shadow-lg border border-slate-600 opacity-80">
        Build: 2026.04.08-v1.1 (Final)
    </div>

    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border-t-4 border-green-600 relative overflow-hidden">
        <div class="absolute -top-1 -right-1 bg-green-500 text-[9px] text-white font-bold px-4 py-1 rotate-45">
            NOVO
        </div>

        <h1 class="text-2xl font-extrabold text-slate-800 mb-1 text-center">Cotação DICOM</h1>
        <p class="text-center text-slate-500 text-[10px] mb-8 uppercase tracking-widest">yuriluna85 / IF Baiano</p>
        
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase">Item para Pesquisa</label>
                <input type="text" id="item" placeholder="Ex: Drone DJI Mavic 3" class="w-full border-2 border-slate-200 p-2 rounded-lg mt-1 focus:border-green-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase">Quantidade</label>
                <input type="number" id="qtd" value="1" min="1" class="w-full border-2 border-slate-200 p-2 rounded-lg mt-1 focus:border-green-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-red-600 uppercase">Seu Token GitHub</label>
                <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" class="w-full border-2 border-red-500/20 p-2 rounded-lg mt-1 focus:border-red-500 outline-none">
            </div>

            <button onclick="enviar()" id="btn" class="w-full bg-green-600 text-white font-bold p-3 rounded-lg hover:bg-green-700 shadow-lg active:scale-95 transition-all">
                GERAR MAPA DE PREÇOS
            </button>
        </div>

        <div id="status" class="mt-6 text-sm text-center font-semibold min-h-[40px]"></div>
    </div>

    <script>
        async function enviar() {
            const item = document.getElementById('item').value;
            const qtd = document.getElementById('qtd').value;
            const token = document.getElementById('token').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');

            const usuario = "yuriluna85"; 
            const repositorio = "cotacao";

            if (!item || !token) { 
                status.innerHTML = "<span class='text-amber-600'>⚠️ Preencha o item e o Token!</span>";
                return; 
            }

            status.innerHTML = "⏳ <span class='animate-pulse'>Acionando robô no GitHub...</span>";
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                const response = await fetch(`https://api.github.com/repos/${usuario}/${repositorio}/actions/workflows/main.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github+json',
                    },
                    body: JSON.stringify({ ref: 'main', inputs: { item: item, quantidade: qtd } })
                });

                if (response.ok) {
                    status.innerHTML = "<span class='text-green-600'>🚀 Sucesso! Robô em execução.<br><a href='https://github.com/yuriluna85/cotacao/actions' target='_blank' class='underline text-blue-500'>Ver progresso no GitHub</a></span>";
                } else {
                    const err = await response.json();
                    throw new Error(err.message);
                }
            } catch (e) {
                status.innerHTML = `<span class='text-red-600'>❌ Erro: ${e.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
