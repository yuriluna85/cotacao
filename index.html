<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DICOM BR v1.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4 font-sans text-white">

    <div class="fixed bottom-4 right-4 bg-yellow-500 text-black text-[10px] px-3 py-1 rounded-full shadow-lg font-bold">
        BUILD: v1.6 (DOMÍNIO .COM.BR)
    </div>

    <div class="bg-zinc-900 p-8 rounded-3xl shadow-2xl w-full max-w-md border-b-8 border-yellow-500 relative">
        <h1 class="text-3xl font-black mb-1 text-center italic tracking-tighter text-yellow-500">DICOM <span class="text-white">BRASIL</span></h1>
        <p class="text-center text-zinc-500 text-[10px] mb-8 uppercase tracking-[0.3em]">yuriluna85 / Localized Engine</p>
        
        <div class="space-y-4">
            <input type="text" id="item" placeholder="Item (ex: Webcam Logitech)" class="w-full bg-zinc-800 border-2 border-zinc-700 p-3 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none">
            <input type="number" id="qtd" value="1" min="1" class="w-full bg-zinc-800 border-2 border-zinc-700 p-3 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none">
            <input type="password" id="token" placeholder="Token PAT" class="w-full bg-zinc-800 border-2 border-zinc-700 p-3 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none">
            
            <button onclick="enviar()" id="btn" class="w-full bg-yellow-500 text-black font-black p-4 rounded-xl hover:bg-yellow-400 shadow-xl active:scale-95 transition-all uppercase tracking-widest">
                Pesquisar no Brasil v1.6
            </button>
        </div>

        <div id="status" class="mt-8 text-xs text-center font-bold uppercase min-h-[20px]"></div>
    </div>

    <script>
        async function enviar() {
            const item = document.getElementById('item').value;
            const qtd = document.getElementById('qtd').value;
            const token = document.getElementById('token').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');

            if (!item || !token) { alert("Preencha tudo!"); return; }

            status.innerHTML = "<span class='text-yellow-500 animate-pulse'>🇧🇷 CONFIGURANDO LOCALIZAÇÃO BR...</span>";
            btn.disabled = true;

            try {
                const response = await fetch(`https://api.github.com/repos/yuriluna85/cotacao/actions/workflows/main.yml/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
                    body: JSON.stringify({ ref: 'main', inputs: { item: item, quantidade: qtd } })
                });

                if (response.ok) {
                    status.innerHTML = "<span class='text-green-500'>✅ SINAL ENVIADO! PDF EM 2 MINUTOS.</span>";
                } else {
                    const err = await response.json();
                    status.innerHTML = `<span class='text-red-500'>❌ ERRO: ${err.message}</span>`;
                }
            } catch (e) {
                status.innerHTML = "<span class='text-red-500'>❌ FALHA DE REDE</span>";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
