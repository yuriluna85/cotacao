<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cotação DICOM - Yuri Luna</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="fixed bottom-4 right-4 bg-red-600 text-white text-[10px] px-3 py-1 rounded-full shadow-lg font-bold animate-bounce">
        BUILD: v1.3 (FORCE UPDATE)
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-b-8 border-green-600 relative">
        <h1 class="text-3xl font-black text-slate-800 mb-1 text-center italic">DICOM <span class="text-green-600">BOT</span></h1>
        <p class="text-center text-slate-400 text-[10px] mb-8 uppercase tracking-[0.2em]">yuriluna85 / IF Baiano</p>
        
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase ml-1">O que você busca?</label>
                <input type="text" id="item" placeholder="Ex: Macobook Pro M3" class="w-full border-2 border-slate-100 p-3 rounded-xl mt-1 focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Qtd</label>
                    <input type="number" id="qtd" value="1" min="1" class="w-full border-2 border-slate-100 p-3 rounded-xl mt-1 focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black text-red-500 uppercase ml-1">Token PAT</label>
                    <input type="password" id="token" placeholder="ghp_..." class="w-full border-2 border-red-50 relative border-slate-100 p-3 rounded-xl mt-1 focus:ring-2 focus:ring-red-500 outline-none">
                </div>
            </div>

            <button onclick="enviar()" id="btn" class="w-full bg-slate-900 text-white font-black p-4 rounded-xl hover:bg-green-600 shadow-xl active:scale-95 transition-all uppercase tracking-widest mt-4">
                Gerar Cotação Oficial
            </button>
        </div>

        <div id="status" class="mt-8 text-xs text-center font-bold uppercase tracking-tight min-h-[20px]"></div>
    </div>

    <script>
        async function enviar() {
            const item = document.getElementById('item').value;
            const qtd = document.getElementById('qtd').value;
            const token = document.getElementById('token').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');

            if (!item || !token) { alert("Preencha os campos obrigatórios!"); return; }

            status.innerHTML = "<span class='text-blue-600 animate-pulse'>🛰️ Enviando sinal para o GitHub v1.3...</span>";
            btn.disabled = true;

            try {
                const response = await fetch(`https://api.github.com/repos/yuriluna85/cotacao/actions/workflows/main.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github+json',
                    },
                    body: JSON.stringify({ ref: 'main', inputs: { item: item, quantidade: qtd } })
                });

                if (response.ok) {
                    status.innerHTML = "<span class='text-green-600 text-lg'>✅ FOI!</span><br><a href='https://github.com/yuriluna85/cotacao/actions' target='_blank' class='text-blue-500 underline'>Clique aqui para ver o robô</a>";
                } else {
                    const err = await response.json();
                    status.innerHTML = `<span class='text-red-500'>❌ ERRO: ${err.message}</span>`;
                }
            } catch (e) {
                status.innerHTML = "<span class='text-red-500'>❌ FALHA DE CONEXÃO</span>";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
